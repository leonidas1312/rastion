name: Validate TSP Hub

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ortools]"

      - name: Validate cards
        run: python -m rastion validate-cards

      - name: Run smoke suite
        run: python -m rastion eval-suite tsplib-small-v1

      - name: Build public TSP hub data
        run: python -m rastion build-site-data --iters 800 --seed 0 --emit-every 50

      - name: Build Astro site
        working-directory: web
        run: |
          npm ci
          npm run build
